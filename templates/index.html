<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #2874f0;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }
        .card {
            background: white;
            width: 220px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }
        .price {
            color: green;
            font-size: 18px;
            margin: 10px 0;
        }
        button {
            background: #ff9f00;
            border: none;
            padding: 10px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #fb641b;
        }
    </style>
</head>
<body>

<header>🛒 E-Commerce Store</header>

<div class="container">
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image }}">
        <h3>{{ product.name }}</h3>
        <p class="price">₹{{ product.price }}</p>
        <button onclick="alert('Added to cart!')">Add to Cart</button>
    </div>
    {% endfor %}
</div>

</body>
</html>
